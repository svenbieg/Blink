source [find interface/cmsis-dap.cfg]

transport select swd
adapter speed 5000

source [find target/swj-dp.tcl]

set _CHIP rp2350

swj_newdap $_CHIP swd -expected-id 0x00040927

dap create $_CHIP.dap -adiv6 -chain-position $_CHIP.swd

set _TARGET0 $_CHIP.cpu0
set _TARGET1 $_CHIP.cpu1

target create $_TARGET0 cortex_m -dap $_CHIP.dap -ap-num 0x2000 -coreid 0 -rtos hwthread
target create $_TARGET1 cortex_m -dap $_CHIP.dap -ap-num 0x4000 -coreid 1 -rtos hwthread

$_TARGET0 cortex_m reset_config sysresetreq
$_TARGET1 cortex_m reset_config sysresetreq

target smp $_TARGET0 $_TARGET1

set _FLASH_TARGET $_TARGET0

$_FLASH_TARGET configure -work-area-phys 0x20010000 -work-area-size 0x10000

set _FLASH_NAME $_CHIP.flash
set _FLASH_BASE 0x10000000
set _FLASH_SIZE 0x400000

flash bank $_FLASH_NAME rp2xxx $_FLASH_BASE $_FLASH_SIZE 1 32 $_FLASH_TARGET
flash bank $_CHIP.alias virtual $_FLASH_BASE 0 0 0 $_TARGET1 $_FLASH_NAME
